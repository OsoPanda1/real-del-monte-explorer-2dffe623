name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install root deps
        run: npm ci

      - name: Install server deps
        run: npm ci
        working-directory: server

      - name: Frontend lint
        run: npm run lint

      - name: Frontend tests
        run: npm run test

      - name: Frontend build
        run: npm run build

      - name: Backend build
        run: npm run build
        working-directory: server

      - name: Prisma migrate deploy (staging-compatible)
        if: ${{ secrets.STAGING_DATABASE_URL != '' }}
        env:
          DATABASE_URL: ${{ secrets.STAGING_DATABASE_URL }}
        run: npx prisma migrate deploy
        working-directory: server
